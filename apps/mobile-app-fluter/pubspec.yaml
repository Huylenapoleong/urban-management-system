version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  provider: ^6.1.2
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.5
  intl: ^0.20.2
  image_picker: ^1.1.2
  file_picker: ^8.0.7
