  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.14
  freezed: ^2.4.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
