  http_parser: ^4.1.1
  google_fonts: ^6.2.1
  skeletonizer: any
  flutter_slidable: any
  path_provider: any
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  firebase_core: any
